[shell]
# Prefix for shell commands (not to be confused with MCUB module prefix)
prefix = /

# Whether to show hints during input
hints = true

# Prompt color: green / cyan / yellow / white
prompt_color = yellow

# Maximum command history
history_size = 100

# Output separator
separator = ─

[paths]
# Commands directory (relative to project root)
bin_dir = console/bin

[display]
# Shell title
title = MCUB Shell
# Show command execution time
show_exec_time = true
