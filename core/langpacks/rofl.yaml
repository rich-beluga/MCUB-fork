access_categories:
  modules:
    label: Модули
    desc: выгрузка, очистка и командование уже установленными модулями
  loader:
    label: Установка модулей
    desc: тащить модули из файлов, ссылок и пресетов
  config:
    label: Конфиг
    desc: настройки юзербота и всякие параметры (осторожно)
  backup:
    label: Бэкапы
    desc: резервные копии на случай катастрофы
  terminal:
    label: Терминал
    desc: shell-команды на сервере (для смелых)
  eval:
    label: Код / Eval
    desc: eval и выполнение кода (на свой страх и риск)
  security:
    label: Безопасность
    desc: owner, security, targeted rules и права доступа
  system:
    label: Система
    desc: update, restart и прочее техобслуживание
  inline:
    label: Inline
    desc: пользоваться инлайн-командами и ботом
  callback:
    label: Callback
    desc: нажимать на кнопки (важная способность)
presets:
  user:
    label: 👤 Обычный пользователь (не трогать лишнего)
  programmer:
    label: 💻 Программист (знает что делает, наверное)
  moderator:
    label: 🛡 Модератор (порядок превыше всего)
