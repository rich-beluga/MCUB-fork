  mcubinfo_html: '<tg-emoji emoji-id="5472164874886846699">✨</tg-emoji> <b>What is a userbot?</b>

    <blockquote expandable>This is a program that works through your personal Telegram
    account using the client API. Unlike regular bots (<code>Bot API</code>), a userbot
    has access to all the functions of a regular user - can send messages, manage
    groups, automate actions and much more.</blockquote>


    <tg-emoji emoji-id="5435957248314579621">⭐</tg-emoji> <b>Advantages:</b> <blockquote expandable><tg-emoji emoji-id="5226945370684140473">➕</tg-emoji> <b>Full automation</b> - can set up
    auto-replies, chat monitoring, channel and group management

    <tg-emoji emoji-id="5226945370684140473">➕</tg-emoji> <b>Unlimited capabilities</b> - access to all Telegram features, including those
    unavailable to regular bots

    <tg-emoji emoji-id="5226945370684140473">➕</tg-emoji> <b>Flexibility and customization</b> - can write custom code for any tasks

    <tg-emoji emoji-id="5226945370684140473">➕</tg-emoji> <b>Direct connection</b> - work directly with Telegram servers without unnecessary
    intermediate layers.</blockquote>


    <tg-emoji emoji-id="5471950641918121951">☃️</tg-emoji> <b>Main risks and disadvantages:</b>

    <blockquote expandable><tg-emoji emoji-id="5229113891081956317">➖</tg-emoji> <b>Account blocking</b> - Telegram may block an account
    for suspicious activity (spam, mass actions)

    <tg-emoji emoji-id="5229113891081956317">➖</tg-emoji> <b>Lack of official support</b> - User API is not officially documented, may
    be unstable

    <tg-emoji emoji-id="5229113891081956317">➖</tg-emoji> <b>User responsibility</b> - the account owner is responsible for the bot''s
    actions that violate Telegram rules

    <tg-emoji emoji-id="5229113891081956317">➖</tg-emoji> <b>Risk to main account</b> - it is recommended to use a separate account for
    the userbot</blockquote>'
